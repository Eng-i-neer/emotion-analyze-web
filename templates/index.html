<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindNote ✨ 记录此刻，理解自己</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div id="app">
        <nav id="sidebar" class="sidebar hidden">
            <div class="sidebar-header">
                <div class="logo">MindNote ✨</div>
                <div class="logo-sub">记录此刻，理解自己。</div>
            </div>
            <div class="sidebar-new-btn">
                <button class="btn btn-new" onclick="App.navigate('record')">✏️ 新建日记</button>
            </div>
            <ul class="nav-list">
                <li class="nav-item active" data-page="home">
                    <span class="nav-icon">🏠</span><span>今日心情</span>
                </li>
                <li class="nav-item" data-page="record">
                    <span class="nav-icon">📝</span><span>情绪日记</span>
                </li>
                <li class="nav-item" data-page="history">
                    <span class="nav-icon">📖</span><span>历史日记</span>
                </li>
                <li class="nav-item" data-page="calendar">
                    <span class="nav-icon">📅</span><span>情绪日历</span>
                </li>
                <li class="nav-item" data-page="charts">
                    <span class="nav-icon">📊</span><span>数据分析</span>
                </li>
                <li class="nav-item" data-page="suggestion">
                    <span class="nav-icon">🌿</span><span>AI 心理助手</span>
                </li>
                <li class="nav-item" data-page="report">
                    <span class="nav-icon">📋</span><span>周报月报</span>
                </li>
                <li class="nav-item" data-page="settings">
                    <span class="nav-icon">⚙️</span><span>设置</span>
                </li>
            </ul>
            <div class="sidebar-tags" id="sidebar-tags">
                <div class="sidebar-tags-title"><span>我的标签</span><span style="cursor:pointer;font-size:1rem">+</span></div>
                <div class="sidebar-tag"><span class="sidebar-tag-dot" style="background:#5D9B63"></span>学习成长</div>
                <div class="sidebar-tag"><span class="sidebar-tag-dot" style="background:#E96862"></span>人际关系</div>
                <div class="sidebar-tag"><span class="sidebar-tag-dot" style="background:#A78BCB"></span>自我探索</div>
                <div class="sidebar-tag"><span class="sidebar-tag-dot" style="background:#5D9B63"></span>健康生活</div>
                <div class="sidebar-tag"><span class="sidebar-tag-dot" style="background:#F6A04D"></span>灵感与想法</div>
            </div>
            <div class="sidebar-quote" id="sidebar-quote">
                你比你想象的更坚韧，也更温柔。<br>—— MindNote
            </div>
            <div class="sidebar-footer">
                <button id="btn-logout" class="btn btn-ghost btn-sm btn-block">退出登录</button>
            </div>
        </nav>

        <nav id="bottom-nav" class="bottom-nav hidden">
            <div class="bottom-nav-item active" data-page="home">
                <span class="nav-icon">🏠</span><span>首页</span>
            </div>
            <div class="bottom-nav-item" data-page="record">
                <span class="nav-icon">📝</span><span>日记</span>
            </div>
            <div class="bottom-nav-item" data-page="history">
                <span class="nav-icon">📖</span><span>历史</span>
            </div>
            <div class="bottom-nav-item" data-page="calendar">
                <span class="nav-icon">📅</span><span>日历</span>
            </div>
            <div class="bottom-nav-item" data-page="charts">
                <span class="nav-icon">📊</span><span>分析</span>
            </div>
        </nav>

        <main id="main-content" class="main-content">
            <div class="notebook-wrap">
                <div id="page-auth" class="page active" style="background:none;border:none;box-shadow:none;padding:0;background-image:none"></div>
                <div id="page-home" class="page"></div>
                <div id="page-record" class="page"></div>
                <div id="page-analysis" class="page"></div>
                <div id="page-history" class="page"></div>
                <div id="page-calendar" class="page"></div>
                <div id="page-charts" class="page"></div>
                <div id="page-report" class="page"></div>
                <div id="page-suggestion" class="page"></div>
                <div id="page-settings" class="page"></div>
            </div>
        </main>
    </div>

    <div id="toast-container" class="toast-container"></div>
    <div id="modal-overlay" class="modal-overlay hidden"></div>

    <script src="/static/js/app.js"></script>
    <script src="/static/js/auth.js"></script>
    <script src="/static/js/home.js"></script>
    <script src="/static/js/record.js"></script>
    <script src="/static/js/history.js"></script>
    <script src="/static/js/calendar.js"></script>
    <script src="/static/js/charts.js"></script>
    <script src="/static/js/report.js"></script>
    <script src="/static/js/suggestion.js"></script>
</body>
</html>
